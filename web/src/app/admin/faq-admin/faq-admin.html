<div class="admin-page">
  <header class="page-header">
    <span class="page-icon"><app-icon name="circle-question-mark" [size]="24" /></span>
    <div>
      <h1>Gérer la FAQ</h1>
      <p>Ajoute, modifie ou supprime les questions fréquentes par campus.</p>
    </div>
  </header>

  <label class="campus-selector">
    <app-icon name="map-pin" [size]="16" /> Campus affiché :
    <select [ngModel]="selectedCampusId()" (ngModelChange)="selectCampus($event)" [ngModelOptions]="{ standalone: true }">
      @for (campus of campuses(); track campus.id) {
        <option [ngValue]="campus.id">{{ campus.name }}</option>
      }
    </select>
  </label>

  <app-crud-table
    title="FAQ"
    [columns]="columns"
    [fields]="fields()"
    [items]="faqs()"
    (create)="onCreate($event)"
    (update)="onUpdate($event)"
    (delete)="onDelete($event)"
  />
</div>
