<div class="auth-page">
  <form class="auth-card" [formGroup]="form" (ngSubmit)="submit()">
    <h1>Inscription</h1>

    <label>
      Prénom
      <input type="text" formControlName="firstName" />
    </label>

    <label>
      Nom
      <input type="text" formControlName="lastName" />
    </label>

    <label>
      Email
      <input type="email" formControlName="email" autocomplete="email" />
    </label>

    <label>
      Mot de passe
      <input type="password" formControlName="password" autocomplete="new-password" />
    </label>
    @if (form.controls.password.hasError('minlength') && form.controls.password.touched) {
      <p class="field-error">8 caractères minimum.</p>
    }

    <label>
      Campus
      <select formControlName="campusId">
        <option [ngValue]="null" disabled>Choisir un campus</option>
        @for (campus of campuses(); track campus.id) {
          <option [ngValue]="campus.id">{{ campus.name }}</option>
        }
      </select>
    </label>

    @if (errorMessage()) {
      <p class="form-error">{{ errorMessage() }}</p>
    }

    <button type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Inscription...' : "S'inscrire" }}
    </button>

    <p class="switch-link">
      Déjà un compte ? <a routerLink="/auth/login">Se connecter</a>
    </p>
  </form>
</div>
