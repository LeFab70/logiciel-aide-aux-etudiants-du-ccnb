<div class="shell">
  <header class="topbar">
    <a class="brand" routerLink="/">
      <span class="brand-icon"><app-icon name="graduation-cap" [size]="22" /></span>
      <span class="brand-text">App <strong>CCNB</strong></span>
    </a>

    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <app-icon name="house" [size]="17" />
        <span>Accueil</span>
      </a>
      <a routerLink="/faq" routerLinkActive="active">
        <app-icon name="circle-question-mark" [size]="17" />
        <span>FAQ</span>
      </a>
      <a routerLink="/directory" routerLinkActive="active">
        <app-icon name="users" [size]="17" />
        <span>Annuaire</span>
      </a>
      <a routerLink="/campus-plan" routerLinkActive="active">
        <app-icon name="map" [size]="17" />
        <span>Plan</span>
      </a>
      @if (authService.hasRole('ADMIN')) {
        <a routerLink="/admin" routerLinkActive="active">
          <app-icon name="shield-check" [size]="17" />
          <span>Admin</span>
        </a>
      }
    </nav>

    <div class="user-menu">
      <button
        type="button"
        class="theme-toggle"
        (click)="themeService.toggle()"
        title="Changer de thème"
      >
        <app-icon [name]="themeService.theme() === 'dark' ? 'sun' : 'moon'" [size]="17" />
      </button>

      @if (authService.currentUser(); as user) {
        <a class="user-info" routerLink="/profile" title="Mon profil">
          <span class="user-avatar"><app-icon name="user" [size]="16" /></span>
          <span class="user-name">{{ user.firstName }}</span>
          <span class="user-campus">{{ user.campus.name }}</span>
        </a>
      }
      <button type="button" class="logout-btn" (click)="logout()" title="Se déconnecter">
        <app-icon name="log-out" [size]="18" />
      </button>

      <button type="button" class="menu-toggle" (click)="toggleMobileMenu()" title="Menu">
        <app-icon [name]="mobileMenuOpen() ? 'x' : 'menu'" [size]="20" />
      </button>
    </div>
  </header>

  @if (mobileMenuOpen()) {
    <nav class="mobile-nav">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <app-icon name="house" [size]="18" /> Accueil
      </a>
      <a routerLink="/faq" routerLinkActive="active">
        <app-icon name="circle-question-mark" [size]="18" /> FAQ
      </a>
      <a routerLink="/directory" routerLinkActive="active">
        <app-icon name="users" [size]="18" /> Annuaire
      </a>
      <a routerLink="/campus-plan" routerLinkActive="active">
        <app-icon name="map" [size]="18" /> Plan du campus
      </a>
      @if (authService.hasRole('ADMIN')) {
        <a routerLink="/admin" routerLinkActive="active">
          <app-icon name="shield-check" [size]="18" /> Administration
        </a>
      }
      <a routerLink="/profile" routerLinkActive="active">
        <app-icon name="user" [size]="18" /> Mon profil
      </a>
    </nav>
  }

  <main class="content">
    <router-outlet />
  </main>
</div>
