spring:
  application:
    name: ccnb-app
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:ccnb}
    username: ${DB_USER:ccnb}
    password: ${DB_PASSWORD:ccnb}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${SERVER_PORT:8080}

ccnb:
  jwt:
    secret: ${JWT_SECRET:dev-only-secret-change-me-dev-only-secret-change-me}
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 30
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  mail:
    from: ${MAIL_USERNAME:}
  verification:
    code-ttl-minutes: 15
